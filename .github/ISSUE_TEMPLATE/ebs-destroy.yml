name: "EBS: Destroy"
description: "Destrói toda a infraestrutura E o volume EBS de dados. IRREVERSÍVEL — todos os dados do banco serão perdidos. ADMIN ONLY."
title: "[ebs:destroy] "
labels: ["ebs:destroy"]
body:
  - type: markdown
    attributes:
      value: |
        > ⚠️ **ATENÇÃO: ESTA OPERAÇÃO É IRREVERSÍVEL.**
        > O volume EBS que contém os dados do banco de dados PostgreSQL será **permanentemente deletado**.
        > Não há recuperação possível após esta operação.
        >
        > Se quiser apenas destruir a stack preservando os dados, use **Stack: Destroy** no lugar desta issue.

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmação obrigatória
      options:
        - label: Confirmo que quero destruir toda a infraestrutura **incluindo** o volume EBS de dados
          required: true
        - label: Entendo que todos os dados do banco de dados PostgreSQL serão **permanentemente perdidos**
          required: true
        - label: Entendo que esta operação é **irreversível** e não há recuperação possível
          required: true

  - type: textarea
    id: reason
    attributes:
      label: Motivo
      description: Por que os dados do banco precisam ser destruídos?
      placeholder: Ex. Encerramento definitivo do projeto, dados de teste descartáveis, etc.
    validations:
      required: true

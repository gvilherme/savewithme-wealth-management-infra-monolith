name: "Stack: Recreate"
description: "Destrói e recria toda a infraestrutura (destroy + apply). ADMIN ONLY."
title: "[stack:recreate] "
labels: ["stack:recreate"]
body:
  - type: markdown
    attributes:
      value: |
        > **Atenção:** Esta ação é restrita ao administrador do repositório.
        > Submeter esta issue irá aplicar a label `stack:recreate` e acionar o workflow automaticamente.
        > Se você não é o owner do repositório, o workflow não será executado.
        >
        > O workflow irá:
        > 1. `terraform destroy` — remove todos os recursos
        > 2. `terraform apply` — recria tudo do zero
        > 3. Atualiza o secret `EC2_HOST` no repositório do app com o novo IP

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmação
      options:
        - label: Confirmo que quero destruir e recriar toda a infraestrutura
          required: true
        - label: Entendo que haverá downtime durante a operação
          required: true
        - label: Verifiquei que o `APP_REPO_TOKEN` e `APP_REPO_SLUG` estão configurados (para atualização do IP)
          required: false

  - type: textarea
    id: reason
    attributes:
      label: Motivo
      description: Por que a stack precisa ser recriada?
      placeholder: Ex. IP blocado, instância corrompida, troca de tipo de instância, etc.
    validations:
      required: true
